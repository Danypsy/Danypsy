; ============================================
; DASM CONFIGURATION FILE FOR ASTEROIDS
; ============================================

; Output format: 3 = Binary file
        FORMAT  3

; Output file name
        OUTPUT  asteroids.bin

; Symbol file name (optional)
        SYMBOLS asteroids.sym

; List file name (optional)
        LIST    asteroids.lst

; Error file name (optional)
        ERRORS  asteroids.err

; Include paths
        INCLUDE asteroids.asm

; Memory map
        SEG     code    $F000
        SEG     variables $80

; End of configuration
